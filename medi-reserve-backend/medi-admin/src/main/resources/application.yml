server:
  port: 8083

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/medi_reserve?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}    # 支持环境变量，默认为空
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

jwt:
  secret: "your-256-bit-secret-key-must-be-long-enough-1234567890"
  expiration: 7200000
  interceptor:
    enabled: true
    exclude-paths:
      # ===== 管理端认证接口 =====
      - /admin/login
      # ===== Swagger/Knife4j 静态资源 =====
      - /doc.html
      - /css/**
      - /js/**
      - /favicon.ico
      - /webjars/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /error

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  group-configs:
    - group: 管理端
      packages-to-scan: com.medireserve.admin.controller
      paths-to-match: '/**'

# knife4j基础配置
knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.medireserve.common.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ========== Actuator 配置（用于健康检查） ==========
management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    redis:
      enabled: true
    db:
      enabled: true