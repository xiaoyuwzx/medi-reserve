# =============================================
# MediReserve 服务反向代理配置
# 根据路径前缀转发到不同的微服务
# =============================================

upstream patient_service {
    server patient:8081;
}

upstream doctor_service {
    server doctor:8082;
}

upstream admin_service {
    server admin:8083;
}

upstream websocket_service {
    server websocket:8084;
}

server {
    listen 80;
    server_name _;  # 替换为你的域名，如 api.medireserve.com

    # 字符集
    charset utf-8;

    # 客户端请求体大小限制
    client_max_body_size 20M;

    # ========== 访问日志 ==========
    access_log /var/log/nginx/medi-access.log main;
    error_log /var/log/nginx/medi-error.log warn;

    # ========== 根路径健康检查 ==========
    location / {
        return 200 'MediReserve API Gateway is running!';
        add_header Content-Type text/plain;
    }

    # ========== 患者端 API ==========
    location /api/patient/ {
        proxy_pass http://patient_service/patient/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========== 医生端 API ==========
    location /api/doctor/ {
        proxy_pass http://doctor_service/doctor/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========== 管理端 API ==========
    location /api/admin/ {
        proxy_pass http://admin_service/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========== WebSocket（需要特殊处理，支持长连接） ==========
    location /ws/ {
        proxy_pass http://websocket_service/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;   # WebSocket 长连接超时设为1小时
        proxy_read_timeout 3600s;
    }

    # ========== 咨询（Consultation）API（WebSocket 相关 HTTP 接口） ==========
    location /api/consultation/ {
        proxy_pass http://websocket_service/consultation/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========== Knife4j 接口文档（各模块独立访问） ==========
    location /doc.html {
        # 默认指向患者端文档，可通过参数切换
        proxy_pass http://patient_service/doc.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态资源（Knife4j 等）
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        proxy_pass http://patient_service;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========== 错误页面 ==========
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}