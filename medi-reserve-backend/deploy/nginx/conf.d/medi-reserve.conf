# ============================================================
# MediReserve 反向代理配置
# 将 /patient、/doctor、/admin、/ws 分别代理到对应服务
# 前端静态资源托管在 /usr/share/nginx/html（可选）
# ============================================================

server {
    listen 80;
    server_name localhost;  # 生产环境请改为您的域名

    # 根目录（前端静态资源，可选）
    root /usr/share/nginx/html;
    index index.html index.htm;

    # 客户端上传大小限制
    client_max_body_size 20M;

    # ---------- 患者端 API ----------
    location /patient/ {
        proxy_pass http://patient:8081/patient/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 医生端 API ----------
    location /doctor/ {
        proxy_pass http://doctor:8082/doctor/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 管理端 API ----------
    location /admin/ {
        proxy_pass http://admin:8083/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- WebSocket 服务（特殊处理） ----------
    location /ws/ {
        proxy_pass http://websocket:8084/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;          # 保持长连接
        proxy_send_timeout 3600s;
    }

    # ---------- 健康检查（各服务的 actuator）----------
    location /actuator/ {
        # 由于各服务 actuator 路径相同，需要通过路径前缀转发到对应服务
        # 注意：这里不做具体转发，推荐各服务直接通过 /actuator/health 访问
        # 如需统一，可分别配置 /patient/actuator、/doctor/actuator 等
        # 本例中保持简洁，直接返回 404
        return 404;
    }

    # ---------- 错误页面 ----------
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}