# =============================================
# HTTPS 配置（使用 Let's Encrypt）
# =============================================

# 自动重定向 HTTP → HTTPS
server {
    listen 80;
    server_name api.medireserve.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.medireserve.com;

    # SSL 证书（通过 certbot 生成）
    ssl_certificate /etc/letsencrypt/live/api.medireserve.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.medireserve.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ... 其他配置同 medi-reserve.conf ...
}