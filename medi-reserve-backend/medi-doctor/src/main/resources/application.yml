server:
  port: 8082

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/medi_reserve?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}    # 支持环境变量，默认为空
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

jwt:
  secret: "your-256-bit-secret-key-must-be-long-enough-1234567890"
  expiration: 7200000
  interceptor:
    enabled: true
    exclude-paths:
      # ===== 医生端认证接口 =====
      - /doctor/login
      - /doctor/register
      # ===== Swagger/Knife4j 静态资源 =====
      - /doc.html
      - /css/**
      - /js/**
      - /favicon.ico
      - /webjars/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /error

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  group-configs:
    - group: 医生端
      packages-to-scan: com.medireserve.doctor.controller
      paths-to-match: '/**'

# knife4j基础配置
knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.medireserve.common.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 阿里云 OSS 与 STS 配置
aliyun:
  oss:
    endpoint: oss-cn-wuhan-lr.aliyuncs.com       # 你的 OSS Endpoint（内外网需区分）
    bucket: medi-reserve-files                   # 你的 Bucket 名称
    # 注意：STS 的 Endpoint 通常为 sts.aliyuncs.com，如果是专有云请替换
    sts-endpoint: sts.aliyuncs.com
    # 以下为 RAM 子账号的 AccessKey（建议只给 AssumeRole 权限）
    access-key-id: ${ALIYUN_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
    # RAM 角色 ARN（在 RAM 控制台 -> 角色管理 中获取）
    # 格式：acs:ram::{主账号ID}:role/{角色名称}
    role-arn: acs:ram::1353664742775914:role/medi-oss-role
    # 临时凭证有效期（单位：秒），建议 1800（30分钟）
    timeout: 1800
    # 上传根目录（可选，默认不填则为 Bucket 根目录，我建议填 'medi'）
    base-dir: medi

# ========== Actuator 配置（用于健康检查） ==========
management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    redis:
      enabled: true
    db:
      enabled: true